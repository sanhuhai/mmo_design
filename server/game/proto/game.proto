syntax = "proto3";

package game;

// 注册请求
message RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
    string phone = 4;
}

// 注册响应
message RegisterResponse {
    int32 code = 1;
    string message = 2;
    int32 user_id = 3;
}

// 登录请求
message LoginRequest {
    string username = 1;
    string password = 2;
}

// 登录响应
message LoginResponse {
    int32 code = 1;
    string message = 2;
    int32 user_id = 3;
    string username = 4;
    string token = 5;
}

// 心跳请求
message HeartbeatRequest {
    int32 user_id = 1;
    string token = 2;
}

// 心跳响应
message HeartbeatResponse {
    int32 code = 1;
    string message = 2;
    int64 timestamp = 3;
}
